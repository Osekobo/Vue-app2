<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>O Berlo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="icon" href="../static/ico.png" type="image/gif" />
    <link rel="stylesheet" href="../static/register.css" />
  </head>

  <body>
    <nav class="navbar">
      <div class="container">
        <a class="navbar-brand" href="home.html">OBerlo</a>
      </div>
    </nav>

    <div class="register-container">
      <div class="register-card">
        <div class="logo-section">
          <div class="logo-icon">
            <i class="fas fa-user-plus"></i>
          </div>
          <h2>Create Account</h2>
          <p>Join us and start your journey</p>
        </div>

        <div id="app">
          <form @submit.prevent="registerUser">
            <div class="input-group-custom">
              <i class="fas fa-user"></i>
              <input
                type="text"
                v-model="name"
                class="form-control-custom"
                placeholder="Full Name"
                required
              />
            </div>

            <div class="input-group-custom">
              <i class="fas fa-phone"></i>
              <!-- <span class="country-code">+254</span> -->
              <input
                type="tel"
                v-model="phone"
                class="form-control-custom phone-input"
                placeholder="Phone Number"
                required
              />
            </div>

            <div class="input-group-custom">
              <i class="fas fa-envelope"></i>
              <input
                type="email"
                v-model="email"
                class="form-control-custom"
                placeholder="Email Address"
                required
              />
            </div>

            <div class="input-group-custom">
              <i class="fas fa-lock"></i>
              <input
                :type="showPassword ? 'text' : 'password'"
                v-model="password"
                class="form-control-custom"
                placeholder="Password"
                required
              />
              <button
                type="button"
                class="password-toggle"
                @click="showPassword = !showPassword"
              >
                <i
                  :class="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"
                ></i>
              </button>
            </div>

            <button type="submit" class="btn-register" :disabled="isLoading">
              <span
                v-if="isLoading"
                class="spinner-border spinner-border-sm me-2"
              ></span>
              {{ isLoading ? 'Creating account...' : 'Register' }}
            </button>

            <div class="login-link">
              Already have an account? <a href="login.html">Login</a>
            </div>

            <!-- <div class="login-link mt-2">
              <a href="home.html">
                <i class="fas fa-arrow-left"></i> Back to Home
              </a>
            </div> -->
          </form>

          <div v-if="message" class="alert-custom" :class="messageType">
            <i class="fas fa-exclamation-triangle me-2"></i>
            {{ message }}
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.7.16/vue.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.0/axios.js"></script>

    <script>
      axios.defaults.withCredentials = true;

      new Vue({
        el: "#app",
        data: {
          name: "",
          phone: "",
          email: "",
          password: "",
          message: "",
          messageType: "alert-custom",
          isLoading: false,
          showPassword: false,
        },
        methods: {
          async registerUser() {
            if (!this.name || !this.email || !this.password || !this.phone) {
              this.message = "Please fill in all fields";
              this.messageType = "alert-custom";
              return;
            }

            this.message = "";
            this.isLoading = true;

            try {
              let phoneNumber = this.phone;
              if (!phoneNumber.startsWith("+")) {
                if (phoneNumber.startsWith("0")) {
                  phoneNumber = "+254" + phoneNumber.substring(1);
                } else if (phoneNumber.startsWith("254")) {
                  phoneNumber = "+" + phoneNumber;
                } else {
                  phoneNumber = "+254" + phoneNumber;
                }
              }

              const userData = {
                name: this.name,
                phone: phoneNumber,
                email: this.email,
                password: this.password,
              };

              const response = await axios.post(
                "http://127.0.0.1:8000/register",
                userData,
                {
                  withCredentials: true,
                },
              );

              this.message = "Registration successful! Redirecting to login...";
              this.messageType = "alert-success-custom";

              setTimeout(() => {
                window.location.href = "login.html";
              }, 2000);
            } catch (error) {
              console.error("Error registering:", error);
              const errorMsg =
                error.response?.data?.detail || "Failed to register user!";
              this.message = errorMsg;
              this.messageType = "alert-custom";
            } finally {
              this.isLoading = false;
            }
          },
        },
      });
    </script>
  </body>
</html>
