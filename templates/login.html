<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>O Berlo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="icon" href="../static/ico.png" type="image/gif" />
    <link rel="stylesheet" href="../static/login.css" />
  </head>

  <body>
    <nav class="navbar">
      <div class="container">
        <a class="navbar-brand" href="home.html">OBerlo</a>
      </div>
    </nav>

    <div class="login-container">
      <div class="login-card">
        <div class="logo-section">
          <div class="logo-icon">
            <i class="fas fa-car"></i>
          </div>
          <h2>Welcome Back!</h2>
          <p>Sign in to access your dashboard</p>
        </div>

        <div id="app">
          <form @submit.prevent="postLogin">
            <div class="input-group-custom">
              <i class="fas fa-envelope"></i>
              <input
                type="email"
                v-model="email"
                class="form-control-custom"
                placeholder="Email Address"
                required
              />
            </div>

            <div class="input-group-custom">
              <i class="fas fa-lock"></i>
              <input
                :type="showPassword ? 'text' : 'password'"
                v-model="password"
                class="form-control-custom"
                placeholder="Password"
                required
              />
              <button
                type="button"
                class="password-toggle"
                @click="showPassword = !showPassword"
              >
                <i
                  :class="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"
                ></i>
              </button>
            </div>

            <button type="submit" class="btn-login" :disabled="isLoading">
              <span
                v-if="isLoading"
                class="spinner-border spinner-border-sm me-2"
              ></span>
              {{ isLoading ? 'Logging in...' : 'Login' }}
            </button>

            <div class="register-link">
              Don't have an account? <a href="register.html">Sign Up</a>
            </div>

            <!-- <div class="register-link mt-2">
              <a href="home.html">
                <i class="fas fa-arrow-left"></i> Back to Home
              </a>
            </div> -->
          </form>

          <div v-if="message" class="alert-custom">
            <i class="fas fa-exclamation-triangle me-2"></i>
            {{ message }}
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.7.16/vue.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.0/axios.js"></script>

    <script>
      axios.defaults.withCredentials = true;

      new Vue({
        el: "#app",
        data: {
          email: "",
          password: "",
          message: "",
          isLoading: false,
          showPassword: false,
        },
        methods: {
          async postLogin() {
            if (!this.email || !this.password) {
              this.message = "Please fill in all fields";
              return;
            }

            this.message = "";
            this.isLoading = true;

            try {
              const resp = await axios.post(
                "http://127.0.0.1:8000/login",
                {
                  email: this.email,
                  password: this.password,
                },
                {
                  withCredentials: true,
                },
              );

              if (resp.data.message === "Login successful") {
                if (resp.data.user) {
                  localStorage.setItem("user", JSON.stringify(resp.data.user));
                }
                localStorage.setItem("isLoggedIn", "true");

                this.message = "Login successful! Redirecting...";
                setTimeout(() => {
                  window.location.href = "dashboard.html";
                }, 1000);
              } else {
                this.message = "Login failed";
              }
            } catch (err) {
              console.error("Login error:", err.response?.data || err.message);
              const errorMsg =
                err.response?.data?.detail ||
                "Login failed. Please check your credentials.";
              this.message = errorMsg;
            } finally {
              this.isLoading = false;
            }
          },
        },
      });
    </script>
  </body>
</html>
